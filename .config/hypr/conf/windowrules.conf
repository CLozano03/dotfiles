# Window rules
# source $HOME/.cache/wal/colors.conf

$floating_opacity = 0.92

######### Launcher rules #########
layerrule {
  name = layerrule-1
  blur = on
  ignore_alpha = 0.1
  dim_around = on
  match:namespace = launcher
}


# layerrule = blur, notifications-window
# layerrule = ignorezero, notifications-window
# layerrule = blurpopups, notifications-window
##############################

layerrule {
  name = layerrule-2
  no_anim = on
  match:namespace = hyprpicker
}

layerrule {
  name = layerrule-3
  no_anim = on
  match:namespace = selection
}


windowrule {
  name = windowrule-1
  float = on
  match:class = xdg-desktop-portal-gtk
}


# Bluetooth Devices
windowrule {
  name = windowrule-2
  float = on
  center = on
  match:title = Bluetooth Devices$
}

windowrule {
  name = windowrule-3
  opacity = $floating_opacity
  size = 750 800
  pin = on
  pseudo = on
  match:title = ^(Bluetooth Devices)$
}


# Pavucontrol
windowrule {
  name = windowrule-4
  float = on
  match:class = org.pulseaudio.pavucontrol$
}

windowrule {
  name = windowrule-5
  pin = on
  opacity = $floating_opacity
  border_size = 2
  size = 750 800
  match:class = ^(org.pulseaudio.pavucontrol)$
}


# Nm-connection-editor
windowrule {
  name = windowrule-6
  float = on
  match:class = nm-connection-editor$
}

windowrule {
  name = windowrule-7
  opacity = $floating_opacity
  match:class = ^(nm-connection-editor)$
}


# Calculator
$calc = org.speedcrunch.speedcrunch
windowrule {
  name = windowrule-8
  float = on
  move = (1375) (70)
  match:class = $calc$
}

windowrule {
  name = windowrule-9
  size = 500 600
  match:class = ^($calc)$
}


# Thunar
windowrule {
  name = windowrule-10
  float = on
  size = 1000 800
  match:class = ^(thunar)$
}


# Gparted
windowrule {
  name = windowrule-11
  float = on
  match:class = gpartedbin$
}

windowrule {
  name = windowrule-12
  size = 1200 800
  match:class = ^(gpartedbin)$
}

# Udiskie
windowrule {
  name = windowrule-13
  float = on
  match:class = udiskie$
}

windowrule {
  name = windowrule-14
  size = 550 200
  match:class = ^(udiskie)$
}


# Swappy (screenshots)
windowrule {
  name = windowrule-15
  stay_focused = on
  center = on
  match:class = ^(swappy)$
}


# ========================================
# Btop from Terminal with title
windowrule {
  name = windowrule-16
  float = on
  border_size = 3
  keep_aspect_ratio = on
  no_max_size = on
  size = 1650 950
  center = on
  match:class = ^($wRTerminal)
  match:title = ^(btop)$
}


# Terminal tiled
windowrule {
  name = windowrule-17
  opacity = 0.85 override 0.91 override 1.0 override
  match:class = ^($wRTerminal)$
}


windowrule {
  name = windowrule-18
  float = on
  size = (monitor_w*0.75) (monitor_h*0.8)
  center = on
  workspace = special:term
  match:class = ^($wRTerminal)
  match:title = ^(floating-terminal)$
}


# Waypaper
windowrule {
  name = windowrule-19
  float = on
  size = 850 800
  center = on
  pin = on
  match:class = (.*waypaper.*)
}


# ========================================
# Opaque windows
# windowrulev2 = opaque,class:^($browser)$
windowrule {
  name = windowrule-20
  opaque = on
  match:class = ^(Code)$
}


# ========================================
# Where to place windows
# ========================================
windowrule {
  name = windowrule-21
  workspace = 1
  match:class = $browser$
}

windowrule {
  name = windowrule-22
  workspace = 3
  match:class = Code$
}

windowrule {
  name = windowrule-23
  workspace = 4
  match:class = ^(org.gnome.Evince)$
}


#######################################################
################### WORKSPACE RULES ###################
#######################################################
workspace = 1, monitor:eDP-1
workspace = 2, monitor:eDP-1
workspace = 3, monitor:eDP-1
workspace = 4, monitor:eDP-1
workspace = 5, monitor:eDP-1
workspace = 6, monitor:HDMI-A-1
workspace = 7, monitor:HDMI-A-1
workspace = 8, monitor:HDMI-A-1
workspace = 9, monitor:HDMI-A-1


windowrule {
  name = windowrule-24
  suppress_event = maximize
  match:class = .*
}


# Spotify
windowrule {
  name = windowrule-25
  workspace = special:music
  float = on
  size = (monitor_w*0.8) (monitor_h*0.8)
  center = on
  match:class = ^(Spotify)$
}

bind = $mainMod SHIFT, P, togglespecialworkspace, music

